services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Servidor
      - SERVER_PORT=8080
      - SERVER_URL=${RAILWAY_PUBLIC_DOMAIN}

      # Autenticación
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}

      # Base de datos (Railway provee DATABASE_URL automáticamente)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=${DATABASE_URL}
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true

      # Cache (sin Redis para simplificar)
      - CACHE_REDIS_ENABLED=false

      # Logs
      - LOG_LEVEL=ERROR,WARN,LOG,INFO
      - LOG_COLOR=true
      - LOG_BAILEYS=error

      # Configuración de instancias
      - CONFIG_SESSION_PHONE_CLIENT=VANTAGE Bot
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - DEL_INSTANCE=false

      # QR Code
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#2563EB
